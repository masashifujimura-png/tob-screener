services:
  - type: web
    name: nomikai-spot-finder
    runtime: docker
    dockerfilePath: ./Dockerfile.nomikai
    plan: free

  - type: web
    name: tob-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile.tob-web
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  - type: cron
    name: tob-updater
    runtime: docker
    dockerfilePath: ./Dockerfile.tob-updater
    schedule: "0 7 * * 1-5"  # 平日 7:00 UTC (16:00 JST) に実行
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
